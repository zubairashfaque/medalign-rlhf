model:
  sft_adapter_repo: Zubairash/medalign-sft-adapters
  base_model: mistralai/Mistral-7B-Instruct-v0.3
  load_in_4bit: true

dpo:
  beta: 0.1
  loss_type: sigmoid
  max_length: 2048
  max_prompt_length: 1024

training:
  output_dir: outputs/dpo
  num_train_epochs: 1
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 5.0e-6
  lr_scheduler_type: cosine
  warmup_ratio: 0.1
  bf16: true
  logging_steps: 10
  save_steps: 200
  optim: paged_adamw_8bit

data:
  dataset_id: Zubairash/medalign-dpo-pairs
